workflows:
  flutter-workflow:
    name: Flutter iOS & Android Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      java: 17

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Build Android
        script: flutter build apk --release

      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/**/outputs/**/*.apk
      - build/ios/**/*.ipa

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
