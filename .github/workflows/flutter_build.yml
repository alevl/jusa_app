name: Flutter Release CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write
      actions: write

    env:
      FLUTTER_VERSION: '3.22.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      # --- SECCIÓN ANDROID (Mantenida igual) ---
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build APK & AAB
        run: |
          flutter clean
          flutter build apk --release
          flutter build appbundle --release

      # --- SECCIÓN iOS PARA APPETIZE (CORREGIDA) ---
      # Aquí eliminamos los certificados y usamos el modo simulador
      - name: Build iOS Simulator App (For Appetize)
        run: |
          flutter build ios --simulator --debug --no-codesign
          # Comprimimos el archivo .app para que Appetize lo acepte
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app

      # --- SUBIR ARTEFACTOS ---
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload iOS Simulator (Appetize)
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/iphonesimulator/Runner.app.zip

      # --- CREAR RELEASE EN GITHUB ---
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Flutter Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          artifacts: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
            build/ios/iphonesimulator/Runner.app.zip
          token: ${{ secrets.GITHUB_TOKEN }}
        # --- FIN CREAR RELEASE EN GITHUB ---  