name: Flutter Release CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write
      actions: write

    env:
      FLUTTER_VERSION: '3.22.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      # --- SECCIÓN ANDROID ---
      - name: Build Android APK
        run: |
          # Si tienes los secrets de Android, descomenta las líneas de abajo
          # echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          flutter build apk --release

      # --- SECCIÓN iOS PARA APPETIZE (SOLUCIÓN DEFINITIVA) ---
      - name: Build iOS Simulator App
        run: |
          # 1. Limpieza total de rastros de Windows en la carpeta iOS
          rm -rf ios/Podfile ios/Podfile.lock ios/Flutter/podhelper.rb
          
          # 2. Re-generar los archivos de soporte nativos de Apple
          flutter precache --ios
          flutter create . --platforms=ios
          
          # 3. Ajustar el Podfile para que acepte Google Maps (iOS 14.0)
          # Buscamos la línea comentada del platform y la activamos con 14.0
          sed -i '' "s/# platform :ios, '11.0'/platform :ios, '14.0'/g" ios/Podfile
          
          # 4. Instalar las librerías de iOS (CocoaPods)
          cd ios
          pod install --repo-update
          cd ..
          
          # 5. Compilar para simulador (Sin necesidad de cuenta de Apple)
          flutter build ios --simulator --debug --no-codesign
          
          # 6. Preparar el paquete para Appetize.io
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app

      # --- SUBIR RESULTADOS ---
      - name: Upload iOS Simulator (Appetize)
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/iphonesimulator/Runner.app.zip

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # --- CREAR RELEASE SI HAY TAG (Opcional) ---
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Flutter Release ${{ github.ref_name }}
          artifacts: |
            build/app/outputs/flutter-apk/app-release.apk
            build/ios/iphonesimulator/Runner.app.zip
          token: ${{ secrets.GITHUB_TOKEN }}